server {
    # ${PORT} is substituted by nginx's envsubst-on-templates entrypoint at
    # startup (defaults to 80; override via the PORT env var, e.g. from compose).
    # $uri/$host below are left intact — envsubst only replaces real env vars.
    listen ${PORT};
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Runtime config is regenerated on every container start — never cache it.
    location = /config.js {
        add_header Cache-Control "no-store";
    }

    # SPA deep-link fallback: unknown paths serve index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
