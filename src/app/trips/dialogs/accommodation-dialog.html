<h2 mat-dialog-title>{{ isEdit ? 'Edit accommodation' : 'Add accommodation' }}</h2>

<mat-dialog-content>
  <form class="entity-form" (ngSubmit)="save()">
    <mat-form-field class="full-width">
      <mat-label>Name</mat-label>
      <input matInput [ngModel]="name()" (ngModelChange)="name.set($event)" name="name" placeholder="e.g. Park Hotel Tokyo" required />
    </mat-form-field>

    <mat-form-field class="full-width">
      <mat-label>Full name (optional)</mat-label>
      <input matInput [ngModel]="fullName()" (ngModelChange)="fullName.set($event)" name="fullName" />
    </mat-form-field>

    <div class="row">
      <app-date-field
        label="Check-in"
        [required]="true"
        [value]="checkInDate()"
        (valueChange)="onCheckInChange($event)"
      />
      <app-date-field
        label="Check-out"
        [required]="true"
        [min]="checkInDate()"
        [(value)]="checkOutDate"
      />
    </div>

    <mat-form-field class="full-width">
      <mat-label>Address (optional)</mat-label>
      <input matInput [ngModel]="address()" (ngModelChange)="address.set($event)" name="address" />
    </mat-form-field>

    <mat-form-field class="full-width">
      <mat-label>Google Maps link (optional)</mat-label>
      <input matInput type="url" [ngModel]="googleMapsUrl()" (ngModelChange)="googleMapsUrl.set($event)" name="maps" />
    </mat-form-field>

    <mat-form-field class="full-width">
      <mat-label>Booking link (optional)</mat-label>
      <input matInput type="url" [ngModel]="bookingUrl()" (ngModelChange)="bookingUrl.set($event)" name="booking" />
    </mat-form-field>

    <mat-form-field class="full-width">
      <mat-label>Price (optional)</mat-label>
      <input matInput [ngModel]="price()" (ngModelChange)="price.set($event)" name="price" placeholder="e.g. ¥18,000 / night" />
    </mat-form-field>

    <mat-form-field class="full-width">
      <mat-label>Remarks (optional)</mat-label>
      <textarea matInput rows="2" [ngModel]="remarks()" (ngModelChange)="remarks.set($event)" name="remarks"></textarea>
    </mat-form-field>

    <app-color-field
      label="Colour"
      [defaultColor]="defaultColor"
      [value]="color()"
      (valueChange)="color.set($event)"
    />

    @if (error()) {
      <p class="error">{{ error() }}</p>
    }
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button matButton mat-dialog-close>Cancel</button>
  <button matButton="filled" color="primary" (click)="save()">
    {{ isEdit ? 'Save' : 'Add' }}
  </button>
</mat-dialog-actions>
