<h2 mat-dialog-title>{{ isEdit ? 'Edit activity' : 'Add activity' }}</h2>

<mat-dialog-content>
  <form class="entity-form" (ngSubmit)="save()">
    <mat-form-field class="full-width">
      <mat-label>Title</mat-label>
      <input matInput [ngModel]="title()" (ngModelChange)="title.set($event)" name="title" placeholder="e.g. Senso-ji Temple" required />
    </mat-form-field>

    <p class="section-label">Start</p>
    <app-zoned-time-field label="Start" [(value)]="start" />

    <mat-checkbox [ngModel]="hasEnd()" (ngModelChange)="hasEnd.set($event)" name="hasEnd">
      Has end time
    </mat-checkbox>
    @if (hasEnd()) {
      <app-zoned-time-field label="End" [(value)]="end" />
    }

    <mat-form-field class="full-width">
      <mat-label>Location (optional)</mat-label>
      <input matInput [ngModel]="location()" (ngModelChange)="location.set($event)" name="location" />
    </mat-form-field>

    <mat-form-field class="full-width">
      <mat-label>Google Maps link (optional)</mat-label>
      <input matInput type="url" [ngModel]="googleMapsUrl()" (ngModelChange)="googleMapsUrl.set($event)" name="maps" />
    </mat-form-field>

    <mat-form-field class="full-width">
      <mat-label>Booking link (optional)</mat-label>
      <input matInput type="url" [ngModel]="bookingUrl()" (ngModelChange)="bookingUrl.set($event)" name="booking" />
    </mat-form-field>

    <mat-form-field class="full-width">
      <mat-label>Notes (optional)</mat-label>
      <textarea matInput rows="2" [ngModel]="notes()" (ngModelChange)="notes.set($event)" name="notes"></textarea>
    </mat-form-field>

    <app-cost-fieldset [options]="currencies" [(value)]="cost" />

    <app-color-field
      label="Colour"
      [defaultColor]="defaultColor"
      [value]="color()"
      (valueChange)="color.set($event)"
    />

    @if (error()) {
      <p class="error">{{ error() }}</p>
    }
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button matButton mat-dialog-close>Cancel</button>
  <button matButton="filled" color="primary" (click)="save()">
    {{ isEdit ? 'Save' : 'Add' }}
  </button>
</mat-dialog-actions>
