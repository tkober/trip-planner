@if (trip(); as t) {
  <section class="view">
    <header class="view-header">
      <h2>Transport</h2>
      <button matButton="filled" (click)="add()">
        <mat-icon>add</mat-icon> Add
      </button>
    </header>

    @if (transports().length) {
      <div class="transport-list">
        @for (transport of transports(); track transport.id) {
          <app-transport-card
            [transport]="transport"
            [homeZone]="t.homeTimeZone"
            [destZone]="t.destinationTimeZone"
            (open)="open(transport)"
            (edit)="edit(transport)"
            (delete)="remove(transport)"
          />
        }
      </div>
    } @else {
      <p class="empty">No transport yet. Add a flight, train, bus or car trip.</p>
    }
  </section>
}
