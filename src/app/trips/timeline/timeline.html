@if (trip(); as t) {
  <header class="view-header">
    <h2>Timeline</h2>
  </header>
  <div
    class="days-grid"
    cdkDropListGroup
    [style.grid-template-columns]="gridTemplateColumns()"
  >
    @for (dv of dayViews(); track dv.day.date; let i = $index) {
      <app-day-section
        [view]="dv"
        [destZone]="t.destinationTimeZone"
        [rowIndex]="i + 1"
        (addActivity)="addActivity($event)"
        (addTransport)="addTransport($event)"
        (openEntry)="openEntry($event)"
        (editEntry)="editEntry($event)"
        (deleteEntry)="deleteEntry($event)"
        (dropped)="onEntryDropped($event)"
      />
    }
    @for (cell of hotelCells(); track cell.rowIndex) {
      <app-hotel-cell
        [rowIndex]="cell.rowIndex"
        [top]="cell.top"
        [bottom]="cell.bottom"
        (open)="openAccommodation($event)"
      />
    }
    @for (label of stayLabels(); track label.id) {
      <div class="stay-label" [style.grid-row]="label.gridRow">{{ label.name }}</div>
    }
    @for (s of straddles(); track s.entry.activity?.id ?? s.entry.transport?.id) {
      <app-straddle-card
        [entry]="s.entry"
        [rowLine]="s.rowLine"
        (open)="openEntry($event)"
        (edit)="editEntry($event)"
        (delete)="deleteEntry($event)"
      />
    }
  </div>
}
