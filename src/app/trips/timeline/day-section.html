<button
  type="button"
  class="day-marker"
  [style.grid-row]="rowIndex()"
  (click)="openDayMenu($event)"
  aria-label="Add to this day"
>
  <div class="day-index">Day {{ view().day.index }}</div>
  <div class="day-date">{{ view().day.startOfDay.toFormat('ccc') }}</div>
  <div class="day-date-num">{{ view().day.startOfDay.toFormat('d LLL') }}</div>
  <div class="day-zone">
    <mat-icon class="zone-icon">schedule</mat-icon>{{ zoneLabel() }}
  </div>
</button>
<div
  class="day-menu-anchor"
  [style.left.px]="menuX()"
  [style.top.px]="menuY()"
  [matMenuTriggerFor]="dayMenu"
></div>
<mat-menu #dayMenu="matMenu">
  <button mat-menu-item (click)="addAccommodation.emit(view().day.date)">
    <mat-icon>hotel</mat-icon><span>Add Accommodation</span>
  </button>
  <button mat-menu-item (click)="addCarReservation.emit(view().day.date)">
    <mat-icon>directions_car</mat-icon><span>Add Car Rental</span>
  </button>
</mat-menu>

<div
  class="day-content"
  [class.pad-top]="view().padTop"
  [class.pad-bottom]="view().padBottom"
  [style.grid-row]="rowIndex()"
  cdkDropList
  [cdkDropListData]="view()"
  (cdkDropListDropped)="dropped.emit($event)"
>
  @for (entry of view().entries; track entry.activity?.id ?? entry.transport?.id) {
    <app-entry-card
      cdkDrag
      [cdkDragData]="entry"
      [entry]="entry"
      [destZone]="destZone()"
      (open)="openEntry.emit($event)"
      (edit)="editEntry.emit($event)"
      (delete)="deleteEntry.emit($event)"
    />
  } @empty {
    <p class="no-entries">No activities or transport yet.</p>
  }

  <button matButton class="add-btn" [matMenuTriggerFor]="addMenu">
    <mat-icon>add</mat-icon>
    Add
  </button>
  <mat-menu #addMenu="matMenu">
    <button mat-menu-item (click)="addActivity.emit(view().day.date)">
      <mat-icon>local_activity</mat-icon><span>Activity</span>
    </button>
    <button mat-menu-item (click)="addTransport.emit(view().day.date)">
      <mat-icon>commute</mat-icon><span>Transport</span>
    </button>
  </mat-menu>
</div>
